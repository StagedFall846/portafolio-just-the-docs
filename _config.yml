title: "Portafolio de Ingeniería"
description: "Mecatrónica y Control Inteligente | Estefania Cruz"

# GitHub Pages: modo recomendado
remote_theme: just-the-docs/just-the-docs
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

# IMPORTANTES:
url: "https://StagedFall846.github.io"
baseurl: "/portafolio-just-the-docs"

# Configuración de Estilo
color_scheme: "light" # Mantiene el fondo blanco
syntax_highlighter: rouge

# Configuración Just the Docs
just_the_docs:
  custom_css:
    - "assets/css/custom.css"
  footer_content: "Estefania Cruz Fragoso"

search_enabled: true
search:
  heading_level: 2

# Enlace al repositorio original
aux_links:
  "Mi GitHub":
    - "https://github.com/StagedFall846"

# Enlaces limpios
permalink: pretty

exclude:
  - "Gemfile"
  - "Gemfile.lock"
  - "node_modules"
  - "vendor"


theme: just-the-docs

color_scheme: dark
